name: LexLingo APK Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, örn. v2.1-ses-aktif'
        required: true
        default: 'v2.1-ses-aktif'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Copy APK with stable name
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/LexLingo_SES_AKTIF.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: LexLingo SES AKTIF ${{ github.event.inputs.tag }}
          files: dist/LexLingo_SES_AKTIF.apk
          generate_release_notes: true
